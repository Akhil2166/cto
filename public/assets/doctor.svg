<svg width="400" height="500" viewBox="0 0 400 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Doctor Portrait Placeholder -->
  <rect width="400" height="500" rx="20" fill="#1a1a2e"/>
  <!-- White coat body -->
  <ellipse cx="200" cy="380" rx="100" ry="110" fill="#f0f0f0"/>
  <!-- Collar -->
  <rect x="170" y="300" width="60" height="40" rx="5" fill="#e8e8e8"/>
  <!-- Head -->
  <ellipse cx="200" cy="180" rx="65" ry="80" fill="#f5e6d3"/>
  <!-- Hair -->
  <ellipse cx="200" cy="130" rx="68" ry="55" fill="#2c2c2c"/>
  <!-- Eyes -->
  <ellipse cx="175" cy="175" rx="10" ry="7" fill="#2c2c2c"/>
  <ellipse cx="225" cy="175" rx="10" ry="7" fill="#2c2c2c"/>
  <ellipse cx="175" cy="173" rx="4" ry="4" fill="white"/>
  <ellipse cx="225" cy="173" rx="4" ry="4" fill="white"/>
  <!-- Smile -->
  <path d="M175 200 Q200 220 225 200" stroke="#c48a6b" stroke-width="2" fill="none"/>
  <!-- Glasses -->
  <rect x="160" y="168" width="30" height="20" rx="5" stroke="#888" stroke-width="1.5" fill="none"/>
  <rect x="210" y="168" width="30" height="20" rx="5" stroke="#888" stroke-width="1.5" fill="none"/>
  <line x1="190" y1="178" x2="210" y2="178" stroke="#888" stroke-width="1.5"/>
  <!-- Stethoscope -->
  <path d="M200 300 Q200 270 185 260" stroke="#666" stroke-width="3" fill="none"/>
  <circle cx="185" cy="260" r="8" fill="none" stroke="#666" stroke-width="2"/>
  <!-- Name badge -->
  <rect x="155" y="270" width="90" height="20" rx="3" fill="#ff6b35"/>
  <text x="200" y="284" text-anchor="middle" font-family="Inter" font-size="9" fill="white" font-weight="600">DR. ALEXANDRA</text>
</svg>